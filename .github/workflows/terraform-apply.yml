name: Terraform Apply

on:
  push:
    branches:
      - main
    paths:
      - 'environments/**'
      - 'modules/**'

env:
  TF_VERSION: '1.14.8'

concurrency:
  group: terraform-apply
  cancel-in-progress: false

jobs:
  terraform-apply-dev:
    name: Apply - Dev
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        working-directory: environments/dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init
        env:
          ARM_CLIENT_ID:       ${{ secrets.ARM_CLIENT_ID_DEV }}
          ARM_CLIENT_SECRET:   ${{ secrets.ARM_CLIENT_SECRET_DEV }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID_DEV }}
          ARM_TENANT_ID:       ${{ secrets.ARM_TENANT_ID_DEV }}

      - name: Terraform Apply
        run: terraform apply -auto-approve -var-file=../../environments/common.tfvars
        env:
          ARM_CLIENT_ID:       ${{ secrets.ARM_CLIENT_ID_DEV }}
          ARM_CLIENT_SECRET:   ${{ secrets.ARM_CLIENT_SECRET_DEV }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID_DEV }}
          ARM_TENANT_ID:       ${{ secrets.ARM_TENANT_ID_DEV }}
          TF_VAR_vm_ssh_public_key: ${{ secrets.VM_SSH_PUBLIC_KEY_DEV }}

  terraform-apply-prod:
    name: Apply - Prod
    runs-on: ubuntu-latest
    environment: prod
    needs: terraform-apply-dev
    defaults:
      run:
        working-directory: environments/prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init
        env:
          ARM_CLIENT_ID:       ${{ secrets.ARM_CLIENT_ID_PROD }}
          ARM_CLIENT_SECRET:   ${{ secrets.ARM_CLIENT_SECRET_PROD }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID_PROD }}
          ARM_TENANT_ID:       ${{ secrets.ARM_TENANT_ID_PROD }}

      - name: Terraform Apply
        run: terraform apply -auto-approve -var-file=../../environments/common.tfvars
        env:
          ARM_CLIENT_ID:       ${{ secrets.ARM_CLIENT_ID_PROD }}
          ARM_CLIENT_SECRET:   ${{ secrets.ARM_CLIENT_SECRET_PROD }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID_PROD }}
          ARM_TENANT_ID:       ${{ secrets.ARM_TENANT_ID_PROD }}
          TF_VAR_vm_ssh_public_key: ${{ secrets.VM_SSH_PUBLIC_KEY_PROD }}
