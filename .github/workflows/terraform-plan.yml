name: Terraform Plan

on:
  pull_request:
    branches:
      - main
    paths:
      - 'environments/**'
      - 'modules/**'

env:
  TF_VERSION: '1.14.8'

jobs:
  terraform-plan-dev:
    name: Plan - Dev
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        working-directory: environments/dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init
        env:
          ARM_CLIENT_ID:       ${{ secrets.ARM_CLIENT_ID_DEV }}
          ARM_CLIENT_SECRET:   ${{ secrets.ARM_CLIENT_SECRET_DEV }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID_DEV }}
          ARM_TENANT_ID:       ${{ secrets.ARM_TENANT_ID_DEV }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate
        env:
          ARM_CLIENT_ID:       ${{ secrets.ARM_CLIENT_ID_DEV }}
          ARM_CLIENT_SECRET:   ${{ secrets.ARM_CLIENT_SECRET_DEV }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID_DEV }}
          ARM_TENANT_ID:       ${{ secrets.ARM_TENANT_ID_DEV }}

      - name: Terraform Plan
        run: terraform plan -no-color -out=tfplan
        env:
          ARM_CLIENT_ID:       ${{ secrets.ARM_CLIENT_ID_DEV }}
          ARM_CLIENT_SECRET:   ${{ secrets.ARM_CLIENT_SECRET_DEV }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID_DEV }}
          ARM_TENANT_ID:       ${{ secrets.ARM_TENANT_ID_DEV }}

      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-dev
          path: environments/dev/tfplan

  terraform-plan-prod:
    name: Plan - Prod
    runs-on: ubuntu-latest
    environment: prod
    defaults:
      run:
        working-directory: environments/prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init
        env:
          ARM_CLIENT_ID:       ${{ secrets.ARM_CLIENT_ID_PROD }}
          ARM_CLIENT_SECRET:   ${{ secrets.ARM_CLIENT_SECRET_PROD }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID_PROD }}
          ARM_TENANT_ID:       ${{ secrets.ARM_TENANT_ID_PROD }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate
        env:
          ARM_CLIENT_ID:       ${{ secrets.ARM_CLIENT_ID_PROD }}
          ARM_CLIENT_SECRET:   ${{ secrets.ARM_CLIENT_SECRET_PROD }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID_PROD }}
          ARM_TENANT_ID:       ${{ secrets.ARM_TENANT_ID_PROD }}

      - name: Terraform Plan
        run: terraform plan -no-color -out=tfplan
        env:
          ARM_CLIENT_ID:       ${{ secrets.ARM_CLIENT_ID_PROD }}
          ARM_CLIENT_SECRET:   ${{ secrets.ARM_CLIENT_SECRET_PROD }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID_PROD }}
          ARM_TENANT_ID:       ${{ secrets.ARM_TENANT_ID_PROD }}

      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-prod
          path: environments/prod/tfplan
